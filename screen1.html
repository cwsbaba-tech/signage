<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>SCREEN 1</title>
<style>
html { margin:0; padding:0; width:100vw; height:100vh; background:#000; overflow:hidden; }
body {
  margin:0; padding:0; width:100vh; height:100vw;
  transform:rotate(-90deg); transform-origin:left top;
  position:absolute; top:100vh; left:0;
  overflow:hidden; background:#000;
}
.slide {
  position:fixed; top:0; left:0; width:200%; height:100%;
  background-repeat:no-repeat;
  background-position:left center;
  background-size:100% 100%;
  opacity:0;
  transition:opacity 0.5s ease-in-out;
}
video {
  position:fixed; top:0; left:0;
  width:200%; height:100%;
  object-fit:fill;
  opacity:0;
  transition:opacity 0.5s ease-in-out;
}
#mainOverlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:#fff url('四角ロゴ.PNG') no-repeat left center;
  background-size:200% auto;
  opacity:0;
  transition:opacity 0.8s ease;
  z-index:20; pointer-events:none;
}
#mainOverlay.visible { opacity:1; }
#startOverlay {
  position:fixed; inset:0; background:#000; color:#fff;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  z-index:9999; cursor:pointer; text-align:center;
}
</style>
</head>
<body>

<div id="startOverlay">
  <h1>タップしてスタート</h1>
  <p>SCREEN 1 (LEFT SIDE)</p>
</div>
<div id="mainOverlay"></div>

<script>
var contents = [
  {type:'video', src:'video1.mp4', duration:9900},
  {type:'image', src:'calendar.jpg', duration:10000},
  {type:'video', src:'video2.mp4', duration:10000},
  {type:'image', src:'holiday.jpg', duration:10000},
  {type:'image', src:'event.jpg', duration:10000}
];
var MAIN_MS = 10000;
var ADJUST_MS = 0;

var INDIVIDUAL_MS = 0;
contents.forEach(function(c) { INDIVIDUAL_MS += c.duration; });
var CYCLE_MS = INDIVIDUAL_MS + MAIN_MS;

var overlay = document.getElementById('mainOverlay');
var started = false;
var lastContentIdx = -1;

var offsets = [];
var acc = 0;
contents.forEach(function(c) { offsets.push(acc); acc += c.duration; });

// 動画の読み込み完了フラグ
var videoReady = {};

var elements = contents.map(function(c, i) {
  var el;
  if (c.type === 'video') {
    el = document.createElement('video');
    el.src = c.src;
    el.muted = true;
    el.setAttribute('muted', '');
    el.setAttribute('playsinline', '');
    el.preload = 'auto';
    videoReady[i] = false;

    // 再生可能になったらフラグを立てる
    el.addEventListener('canplaythrough', function() {
      videoReady[i] = true;
    });
    // エラー時も一応フラグを立てて固まらないようにする
    el.addEventListener('error', function() {
      videoReady[i] = true;
    });
  } else {
    el = document.createElement('div');
    el.className = 'slide';
    el.style.backgroundImage = "url('" + c.src + "')";
  }
  document.body.appendChild(el);
  return el;
});

function seekAndPlay(el, idx, offset) {
  var targetTime = (offset - offsets[idx]) / 1000;
  var maxTime = contents[idx].duration / 1000 - 0.1;
  targetTime = Math.min(targetTime > 0 ? targetTime : 0, maxTime);

  // seekできる状態かチェック
  if (el.readyState >= 2) {
    el.currentTime = targetTime;
    el.play().catch(function(e){});
  } else {
    // まだ読み込めていない場合は読み込み完了を待つ
    el.addEventListener('canplay', function handler() {
      el.removeEventListener('canplay', handler);
      el.currentTime = targetTime;
      el.play().catch(function(e){});
    });
    el.load(); // 再度ロードを試みる
  }
}

function showContent(idx, offset) {
  elements.forEach(function(el, i) {
    if (i === idx) {
      el.style.opacity = '1';
      if (contents[i].type === 'video') {
        seekAndPlay(el, idx, offset);
      }
    } else {
      el.style.opacity = '0';
      if (el.tagName === 'VIDEO') el.pause();
    }
  });
}

function tick() {
  if (!started) return;

  var now = Date.now() + ADJUST_MS;
  var offset = now % CYCLE_MS;
  var isMain = offset >= INDIVIDUAL_MS;

  if (isMain) {
    if (lastContentIdx !== 999) {
      lastContentIdx = 999;
      elements.forEach(function(el){ el.style.opacity = '0'; if(el.pause) el.pause(); });
      overlay.classList.add('visible');
    }
  } else {
    var idx = 0;
    for (var i = contents.length - 1; i >= 0; i--) {
      if (offset >= offsets[i]) { idx = i; break; }
    }
    if (idx !== lastContentIdx) {
      overlay.classList.remove('visible');
      lastContentIdx = idx;
      showContent(idx, offset);
    }
  }
}

setInterval(tick, 100);

document.getElementById('startOverlay').addEventListener('click', function() {
  document.getElementById('startOverlay').style.display = 'none';
  ensureFullscreen();
  started = true;
});

function ensureFullscreen() {
  var el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}
</script>
</body>
</html>
