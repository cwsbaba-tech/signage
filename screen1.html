<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>DIGITAL SIGNAGE</title>
<style>
/* CSSは前述の通り、全画面表示とvideo要素の隠蔽/表示を管理 */
html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; overflow: hidden; }
.slide, video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 0.5s ease-in-out; object-fit: cover; z-index: 10; }
#mainOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; background-size: cover; opacity: 0; transition: opacity 0.8s ease; z-index: 20; pointer-events: none; }
#mainOverlay.visible { opacity: 1; }
#startOverlay { position: fixed; inset: 0; background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; cursor: pointer; text-align: center; }
#startOverlay h1 { font-size: 7vw; margin-bottom: 2vh; }
</style>
</head>
<body>
<div id="startOverlay"><h1>タップしてスタート</h1></div>
<div id="mainOverlay"></div>
<script>
// screen1.html の設定例
var contents = [
  {type: 'video', src: 'video1_screen1.mp4', duration: 15000},
  {type: 'video', src: 'video2_screen1.mp4', duration: 15000},
  {type: 'image', src: 'calendar_screen1.jpg', duration: 10000}
];

// 初期化：最初からDOMを生成し、Androidのキャッシュ/自動再生ロックを回避
var elements = contents.map(function(c) {
  var el = document.createElement(c.type === 'video' ? 'video' : 'div');
  if (c.type === 'video') {
    el.src = c.src; el.muted = true; el.playsInline = true; el.preload = 'auto';
  } else { el.className = 'slide'; el.style.backgroundImage = "url('" + c.src + "')"; }
  document.body.appendChild(el);
  return el;
});

// タップして再生を開始（Androidのユーザー操作制限を突破）
document.getElementById('startOverlay').addEventListener('click', function() {
  document.documentElement.requestFullscreen();
  document.getElementById('startOverlay').style.display = 'none';
  // 全要素を一度再生して一時停止することで再生許可を得る
  elements.forEach(function(el) { if (el.tagName === 'VIDEO') el.play().then(() => el.pause()); });
  setInterval(tick, 200); // 描画処理開始
});
// (以降の再生・切替ロジックは標準的なタイミング制御)
</script>
</body>
</html>
