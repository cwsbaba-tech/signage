<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>SCREEN 1</title>
<style>
html, body {
  margin:0; padding:0;
  width:100%; height:100%;
  background:#000; overflow:hidden;
}
#wrap {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
}
video {
  position:absolute;
  top:0; left:0;
  width:200%;
  height:100%;
  object-fit:cover;
  object-position:left center;
  display:none;
}
.slide {
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  background-size:200% auto;
  background-position:left center;
  background-repeat:no-repeat;
  display:none;
}
#mainOverlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:#fff url('四角ロゴ.PNG') no-repeat left center;
  background-size:150% auto;
  display:none;
  z-index:20;
}
#startOverlay {
  position:fixed; inset:0;
  background:#000; color:#fff;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  z-index:9999; cursor:pointer; text-align:center;
}
#startOverlay h1 { font-size:7vw; margin-bottom:2vh; }
#startOverlay p  { font-size:4vw; opacity:0.8; }
</style>
</head>
<body>
<div id="startOverlay">
  <h1>タップしてスタート</h1>
  <p>全画面表示で開始します</p>
</div>
<div id="wrap">
  <video id="v0" src="video1.mp4" muted playsinline webkit-playsinline preload="auto"></video>
  <video id="v1" src="video2.mp4" muted playsinline webkit-playsinline preload="auto"></video>
  <video id="v2" src="video3.mp4" muted playsinline webkit-playsinline preload="auto"></video>
  <div id="s0" class="slide" style="background-image:url('calendar.jpg')"></div>
</div>
<div id="mainOverlay"></div>

<script>
var contents = [
  {type:'video', src:'video1.mp4', duration:15000, rotate:0},
  {type:'video', src:'video2.mp4', duration:15000, rotate:0},
  {type:'video', src:'video3.mp4', duration:10000, rotate:90},
  {type:'image', src:'calendar.jpg', duration:10000, rotate:0}
];

var INDIVIDUAL_MS = 0;
contents.forEach(function(c) { INDIVIDUAL_MS += c.duration; });
var MAIN_MS  = 10000;
var CYCLE_MS = INDIVIDUAL_MS + MAIN_MS;

var offsets = [];
var acc = 0;
contents.forEach(function(c) { offsets.push(acc); acc += c.duration; });

var overlay        = document.getElementById('mainOverlay');
var started        = false;
var syncPhase      = null;
var lastIdx        = -1;

function getIdx(offset) {
  for (var i = contents.length - 1; i >= 0; i--) {
    if (offset >= offsets[i]) return i;
  }
  return 0;
}

function hideAll() {
  contents.forEach(function(c) {
    c.el.style.display = 'none';
    if (c.type === 'video') c.el.pause();
  });
  overlay.style.display = 'none';
}

function showContent(i) {
  hideAll();
  var c = contents[i];
  c.el.style.display = 'block';
  if (c.type === 'video') {
    c.el.currentTime = 0;
    c.el.play();
  }
}

function tick() {
  if (!started) return;
  var offset = Date.now() % CYCLE_MS;
  var isMain = offset >= INDIVIDUAL_MS;

  if (isMain) {
    if (syncPhase !== 'main') {
      syncPhase = 'main';
      lastIdx = -1;
      hideAll();
      overlay.style.display = 'block';
    }
  } else {
    var idx = getIdx(offset);
    if (syncPhase !== 'individual') {
      syncPhase = 'individual';
      overlay.style.display = 'none';
    }
    if (idx !== lastIdx) {
      lastIdx = idx;
      showContent(idx);
    }
  }
}

setInterval(tick, 500);

document.getElementById('startOverlay').addEventListener('click', function() {
  ensureFullscreen();
  document.getElementById('startOverlay').style.display = 'none';
  started = true;
  showContent(0);
  lastIdx = 0;
});

function ensureFullscreen() {
  var el = document.documentElement;
  if (!document.fullscreenElement) {
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.msRequestFullscreen) el.msRequestFullscreen();
  }
}
document.addEventListener('fullscreenchange', function() {
  if (!document.fullscreenElement) setTimeout(ensureFullscreen, 500);
});
</script>
</body>
</html>
