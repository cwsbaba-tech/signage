<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>SCREEN 1</title>
<style>
html {
  margin:0; padding:0;
  width:100vw; height:100vh;
  background:#000; overflow:hidden;
}
body {
  margin:0; padding:0;
  width:100vh;
  height:100vw;
  transform:rotate(-90deg);
  transform-origin:left top;
  position:absolute;
  top:100vh;
  left:0;
  overflow:hidden;
  background:#000;
}
.slide {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background-repeat:no-repeat;
  background-position:left center;
  background-size:200% auto;
  opacity:0;
  transition:opacity 0.5s ease-in-out;
}
video {
  position:fixed; top:0; left:0;
  width:200%; height:100%;
  object-fit:cover;
  object-position:left center;
  opacity:0;
  transition:opacity 0.5s ease-in-out;
}
#mainOverlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:#fff url('四角ロゴ.PNG') no-repeat left center;
  background-size:150% auto;
  opacity:0;
  transition:opacity 0.8s ease;
  z-index:20; pointer-events:none;
}
#mainOverlay.visible { opacity:1; }
#startOverlay {
  position:fixed; inset:0;
  background:#000; color:#fff;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  z-index:9999; cursor:pointer; text-align:center;
}
#startOverlay h1 { font-size:7vw; margin-bottom:2vh; }
#startOverlay p  { font-size:4vw; opacity:0.8; }
</style>
</head>
<body>

</div>
<div id="mainOverlay"></div>
