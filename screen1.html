<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>SCREEN 1</title>
<style>
html, body { margin:0; padding:0; width:100%; height:100%; background:#fff; overflow:hidden; }

/* 通常スライド（左半分表示） */
.slide {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background-repeat:no-repeat;
  background-size:200% 100%;
  background-position:left center;
  opacity:0;
  transition:opacity 1s ease-in-out;
}

/* メインオーバーレイ（四角ロゴ左半分） */
#mainOverlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:#fff no-repeat;
  background-image:url('四角ロゴ.PNG');
  background-size:200% auto;
  background-position:left center;
  opacity:0;
  transition:opacity 0.8s ease;
  z-index:20; pointer-events:none;
}
#mainOverlay.visible { opacity:1; }
</style>
</head>
<body>
<div id="mainOverlay"></div>

<script>
var slides = [
  {img:'s1_1.jpg'},
  {img:'s1_2.jpg'},
  {img:'s1_3.jpg'}
];

var overlay = document.getElementById('mainOverlay');

var slideEls = slides.map(function(s) {
  var el = document.createElement('div');
  el.className = 'slide';
  el.style.backgroundImage = "url('" + s.img + "')";
  document.body.appendChild(el);
  return el;
});

var SLIDE_COUNT    = slides.length;
var SLIDE_DURATION = 20000;
var INDIVIDUAL_MS  = SLIDE_COUNT * SLIDE_DURATION;
var MAIN_MS        = 10000;
var CYCLE_MS       = INDIVIDUAL_MS + MAIN_MS;

var syncPhase    = null;
var lastSlideIdx = -1;

function showSlide(i) {
  slideEls.forEach(function(el, idx) {
    el.style.opacity = idx === i ? '1' : '0';
  });
}

function tick() {
  var offset = Date.now() % CYCLE_MS;
  var isMain = offset >= INDIVIDUAL_MS;

  if (isMain) {
    if (syncPhase !== 'main') {
      syncPhase = 'main';
      overlay.classList.add('visible');
    }
  } else {
    var slideIdx = Math.floor(offset / SLIDE_DURATION) % SLIDE_COUNT;
    if (syncPhase !== 'individual') {
      syncPhase = 'individual';
      overlay.classList.remove('visible');
    }
    if (slideIdx !== lastSlideIdx) {
      lastSlideIdx = slideIdx;
      showSlide(slideIdx);
    }
  }
}

setInterval(tick, 500);

function ensureFullscreen() {
  var el = document.documentElement;
  if (!document.fullscreenElement) {
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.msRequestFullscreen) el.msRequestFullscreen();
  }
}
document.addEventListener('click', ensureFullscreen, {once:true});
document.addEventListener('fullscreenchange', function() {
  if (!document.fullscreenElement) setTimeout(ensureFullscreen, 500);
});
setTimeout(ensureFullscreen, 1000);
</script>
</body>
</html>
