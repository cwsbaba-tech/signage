<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>SCREEN 1</title>
<style>
html {
  margin:0; padding:0;
  width:100vw; height:100vh;
  background:#000; overflow:hidden;
}
body {
  margin:0; padding:0;
  width:100vh;
  height:100vw;
  transform:rotate(-90deg);
  transform-origin:left top;
  position:absolute;
  top:100vh;
  left:0;
  overflow:hidden;
  background:#000;
}
.slide {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background-repeat:no-repeat;
  background-position:left center;
  background-size:200% auto;
  opacity:0;
  transition:opacity 0.5s ease-in-out;
}
video {
  position:fixed; top:0; left:0;
  width:200%; height:100%;
  object-fit:cover;
  object-position:left center;
  opacity:0;
  transition:opacity 0.5s ease-in-out;
}
#mainOverlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:#fff;
  background-image:url('四角ロゴ.PNG');
  background-repeat:no-repeat;
  background-size:150% auto;
  background-position:left center;
  opacity:0;
  transition:opacity 0.8s ease;
  z-index:20; pointer-events:none;
}
#mainOverlay.visible { opacity:1; }
#startOverlay {
  position:fixed; inset:0;
  background:#000; color:#fff;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  z-index:9999; cursor:pointer; text-align:center;
}
#startOverlay h1 { font-size:7vw; margin-bottom:2vh; }
#startOverlay p  { font-size:4vw; opacity:0.8; }
</style>
</head>
<body>

<div id="startOverlay">
  <h1>タップしてスタート</h1>
  <p>全画面表示で開始します</p>
</div>
<div id="mainOverlay"></div>

<script>
var contents = [
  {type:'video', src:'video1.mp4'},
  {type:'video', src:'video2.mp4'},
  {type:'video', src:'video3.mp4'},
  {type:'image', src:'calendar.jpg', duration:10000},
  {type:'overlay', duration:10000} // mainOverlayの表示を配列に統合
];

var currentIndex = 0;
var elements = [];
var overlay = document.getElementById('mainOverlay');
var started = false;

// 1. 各要素をあらかじめDOMに生成しておく
contents.forEach(function(c, i) {
  var el = null;
  if (c.type === 'video') {
    el = document.createElement('video');
    el.src = c.src;
    el.muted = true;
    el.playsInline = true;
    el.preload = 'auto'; // 事前読み込みを指示
    el.setAttribute('playsinline', '');
    el.setAttribute('webkit-playsinline', '');
    
    // 動画が最後まで再生されたら次のコンテンツへ
    el.addEventListener('ended', nextContent);
  } else if (c.type === 'image') {
    el = document.createElement('div');
    el.className = 'slide';
    el.style.backgroundImage = "url('" + c.src + "')";
  }
  
  if (el) {
    el.style.opacity = '0';
    document.body.appendChild(el);
    elements[i] = el;
  } else {
    elements[i] = null; // オーバーレイ用のプレースホルダー
  }
});

// 2. 全てを非表示にする
function hideAll() {
  elements.forEach(function(el) {
    if (el) {
      el.style.opacity = '0';
      if (el.tagName === 'VIDEO') el.pause();
    }
  });
  overlay.classList.remove('visible');
}

// 3. 次のコンテンツを再生する関数
function showContent(index) {
  hideAll();
  var c = contents[index];
  var el = elements[index];

  if (c.type === 'overlay') {
    overlay.classList.add('visible');
    setTimeout(nextContent, c.duration);
  } else if (c.type === 'image') {
    el.style.opacity = '1';
    setTimeout(nextContent, c.duration);
  } else if (c.type === 'video') {
    el.style.opacity = '1';
    el.currentTime = 0;
    el.play().catch(function(e) { console.log("再生エラー:", e); });
  }
}

function nextContent() {
  if (!started) return;
  currentIndex = (currentIndex + 1) % contents.length;
  showContent(currentIndex);
}

// 4. スタート処理
document.getElementById('startOverlay').addEventListener('click', function() {
  ensureFullscreen();
  document.getElementById('startOverlay').style.display = 'none';
  started = true;
  showContent(currentIndex);
});

// 全画面の制御
function ensureFullscreen() {
  var el = document.documentElement;
  if (!document.fullscreenElement) {
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.msRequestFullscreen) el.msRequestFullscreen();
  }
}
document.addEventListener('fullscreenchange', function() {
  if (!document.fullscreenElement && started) {
    setTimeout(ensureFullscreen, 500);
  }
});
</script>
</body>
</html>
