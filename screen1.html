<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>SCREEN 1 - LEFT</title>
<style>
html { margin:0; padding:0; width:100vw; height:100vh; background:#000; overflow:hidden; }
body {
  margin:0; padding:0; width:100vh; height:100vw;
  transform:rotate(-90deg); transform-origin:left top;
  position:absolute; top:100vh; left:0;
  overflow:hidden; background:#000;
}
/* ビデオの配置設定（左半分を切り出す） */
video {
  position:fixed; top:0; 
  left:0; /* 左端から配置 */
  width:200%; height:100%; /* 2枚分の幅 */
  object-fit:fill; opacity:0;
  transition:opacity 0.5s ease-in-out;
}
/* 画像の配置設定 */
.slide {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background-repeat:no-repeat;
  background-position:left center;
  background-size:200% auto;
  opacity:0; transition:opacity 0.5s ease-in-out;
}
#mainOverlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:#fff url('四角ロゴ.PNG') no-repeat left center;
  background-size:200% auto; opacity:0;
  transition:opacity 0.8s ease; z-index:20; pointer-events:none;
}
#mainOverlay.visible { opacity:1; }
#startOverlay {
  position:fixed; inset:0; background:#000; color:#fff;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  z-index:9999; cursor:pointer; text-align:center;
}
</style>
</head>
<body>

<div id="startOverlay">
  <h1>タップしてスタート</h1>
  <p>SCREEN 1 (LEFT SIDE)</p>
</div>
<div id="mainOverlay"></div>

<script>
// --- 同期設定 ---
var contents = [
  {type:'video', src:'video1.mp4', duration:10000},
  {type:'image', src:'calendar.jpg', duration:10000},
  {type:'video', src:'video2.mp4', duration:10000},
  {type:'image', src:'holiday.jpg', duration:10000},
  {type:'image', src:'event.jpg', duration:10000}
];
var MAIN_MS = 10000;

var INDIVIDUAL_MS = 0;
contents.forEach(function(c) { INDIVIDUAL_MS += c.duration; });
var CYCLE_MS = INDIVIDUAL_MS + MAIN_MS;
var offsets = [];
var acc = 0;
contents.forEach(function(c) { offsets.push(acc); acc += c.duration; });

var overlay = document.getElementById('mainOverlay');
var started = false;
var lastContentIdx = -1;

// 要素作成（videoのpreloadをmetadataのみにして負荷軽減）
var elements = contents.map(function(c) {
  var el;
  if (c.type === 'video') {
    el = document.createElement('video');
    el.src = c.src;
    el.muted = true;
    el.setAttribute('muted', '');
    el.setAttribute('playsinline', '');
    el.preload = 'metadata'; // 全体ではなくメタデータのみ先に読む
    el.loop = false;
  } else {
    el = document.createElement('div');
    el.className = 'slide';
    el.style.backgroundImage = "url('" + c.src + "')";
  }
  el.style.opacity = '0';
  document.body.appendChild(el);
  return el;
});

function hideAll() {
  elements.forEach(function(el) {
    el.style.opacity = '0';
    // いきなりpauseせず、表示が消えてから少し遅らせる（フリーズ防止）
    if (el.tagName === 'VIDEO') {
      setTimeout(function() { if(el.style.opacity == '0') el.pause(); }, 100);
    }
  });
  overlay.classList.remove('visible');
}

function showContent(i) {
  var el = elements[i];
  var c = contents[i];
  
  if (c.type === 'video') {
    var offset = Date.now() % CYCLE_MS;
    var targetTime = (offset - offsets[i]) / 1000;
    
    // 再生位置をセットしてから表示
    el.currentTime = Math.max(0, targetTime);
    el.play().then(function() {
      hideAll(); // 他を消す
      el.style.opacity = '1';
    }).catch(function(e) {
      console.log("Retry...");
      setTimeout(function() { el.play(); el.style.opacity = '1'; }, 500);
    });
  } else {
    hideAll();
    el.style.opacity = '1';
  }
}

function tick() {
  if (!started) return;
  var offset = Date.now() % CYCLE_MS;
  var isMain = offset >= INDIVIDUAL_MS;

  if (isMain) {
    if (lastContentIdx !== 999) {
      lastContentIdx = 999;
      hideAll();
      overlay.classList.add('visible');
    }
  } else {
    var idx = 0;
    for (var i = contents.length - 1; i >= 0; i--) {
      if (offset >= offsets[i]) { idx = i; break; }
    }
    if (idx !== lastContentIdx) {
      overlay.classList.remove('visible');
      lastContentIdx = idx;
      showContent(idx);
    }
    
    // ズレ補正の頻度を落とす（1秒以上のズレがある時だけにする）
    var curEl = elements[idx];
    if (contents[idx].type === 'video' && !curEl.paused) {
      var target = (offset - offsets[idx]) / 1000;
      if (Math.abs(curEl.currentTime - target) > 1.0) { // 判定を緩くして負荷軽減
        curEl.currentTime = target;
      }
    }
  }
}

// 100msだとAndroidには速すぎる場合があるため200msに緩和
setInterval(tick, 200);

document.getElementById('startOverlay').addEventListener('click', function() {
  this.style.display = 'none';
  started = true;
  // 初回のみ全ビデオを一度play/pauseして「準備」させる（Androidの制約対策）
  elements.forEach(function(el) {
    if (el.tagName === 'VIDEO') {
      el.play().then(function(){ el.pause(); });
    }
  });
});
</script>
</body>
</html>
