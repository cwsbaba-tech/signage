<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>SCREEN 2</title>
<style>
  html, body { 
    margin:0; padding:0; width:100%; height:100%; 
    background:#000; overflow:hidden; position:fixed;
  }

  #container {
    position: absolute;
    top: 50%; left: 50%;
    width: 100vh; height: 100vw;
    transform: translate(-50%, -50%) rotate(-90deg);
    background: #000;
    overflow: hidden;
  }

  /* コンテンツの右半分を表示する設定 */
  .slide {
    position: absolute;
    inset: 0;
    background-repeat: no-repeat;
    background-size: 200% 100%; 
    background-position: right center; /* 右半分を出す */
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  video {
    position: absolute;
    top: 0; left: -100%; /* 左に追い出して右半分を出す */
    width: 200%; height: 100%;
    object-fit: fill;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  /* 【重要】ロゴの右半分（画像としては左側）を表示する設定 */
  #mainOverlay {
    position: absolute;
    inset: 0;
    background: #fff url('四角ロゴ.PNG') no-repeat;
    /* 200%の幅のロゴ画像の「左側」をこの画面の「左端」に置くことで、
       結果としてロゴの「右半分」がこの画面に表示されます */
    background-position: left center; 
    background-size: 200% auto;
    opacity: 0;
    transition: opacity 0.8s ease;
    z-index: 20;
  }

  #mainOverlay.visible { opacity: 1; }

  #startOverlay {
    position: fixed; inset: 0; background: #000; color: #fff;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 9999; cursor: pointer;
  }
</style>
</head>
<body>

<div id="startOverlay">
  <h1>TAP TO START</h1>
  <p>SCREEN 2 (RIGHT SIDE)</p>
</div>

<div id="container">
  <div id="mainOverlay"></div>
</div>

<script>
var contents = [
  {type:'video', src:'video1.mp4', duration:10000},
  {type:'image', src:'calendar.jpg', duration:10000},
  {type:'video', src:'video2.mp4', duration:10000},
  {type:'image', src:'holiday.jpg', duration:10000},
  {type:'image', src:'event.jpg', duration:10000}
];
var MAIN_MS = 10000;
var ADJUST_MS = 0; 

var INDIVIDUAL_MS = contents.reduce((a, b) => a + b.duration, 0);
var CYCLE_MS = INDIVIDUAL_MS + MAIN_MS;
var offsets = [];
var acc = 0;
contents.forEach(c => { offsets.push(acc); acc += c.duration; });

var container = document.getElementById('container');
var elements = contents.map(c => {
  var el = document.createElement(c.type === 'video' ? 'video' : 'div');
  if (c.type === 'video') {
    el.src = c.src; el.muted = true;
    el.setAttribute('muted', ''); el.setAttribute('playsinline', '');
    el.preload = 'auto';
  } else {
    el.className = 'slide';
    el.style.backgroundImage = "url('" + c.src + "')";
  }
  container.appendChild(el);
  return el;
});

var lastIdx = -1;
var started = false;

function showContent(idx, offset) {
  elements.forEach((el, i) => {
    if (i === idx) {
      el.style.opacity = '1';
      if (contents[i].type === 'video') {
        var targetTime = (offset - offsets[i]) / 1000;
        el.currentTime = Math.max(0, targetTime);
        el.play().catch(()=>{});
      }
    } else {
      el.style.opacity = '0';
      if (el.tagName === 'VIDEO') el.pause();
    }
  });
}

function tick() {
  if (!started) return;
  var offset = (Date.now() + ADJUST_MS) % CYCLE_MS;
  var isMain = offset >= INDIVIDUAL_MS;

  if (isMain) {
    if (lastIdx !== 999) {
      lastIdx = 999;
      elements.forEach(el => { el.style.opacity = 0; if(el.pause) el.pause(); });
      document.getElementById('mainOverlay').classList.add('visible');
    }
  } else {
    var idx = 0;
    for (var i = contents.length - 1; i >= 0; i--) { if (offset >= offsets[i]) { idx = i; break; } }
    if (idx !== lastIdx) {
      document.getElementById('mainOverlay').classList.remove('visible');
      lastIdx = idx;
      showContent(idx, offset);
    }
  }
}

setInterval(tick, 100);

document.getElementById('startOverlay').addEventListener('click', function() {
  this.style.display = 'none';
  var el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  started = true;
});
</script>
</body>
</html>
