<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>SCREEN - Split Left/Right (Fixed)</title>

<style>
html {
  margin:0; padding:0;
  width:100vw; height:100vh;
  background:#000; overflow:hidden;
}
body {
  margin:0; padding:0;
  width:100vh;
  height:100vw;
  transform:rotate(-90deg);
  transform-origin:left top;
  position:absolute;
  top:100vh;
  left:0;
  overflow:hidden;
  background:#000;
}

/* 全要素共通のクリップ設定 */
.slide, video, #mainOverlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  opacity:0;
  transition:opacity 0.5s ease-in-out;
}

video {
  object-fit:cover;
  object-position:center center;
}

/* 動画の回転・拡大補正 */
.rotate-90-fix { transform: rotate(90deg) scale(1.8); }
.rotate-neg90-fix { transform: rotate(-90deg) scale(1.8); }
.rotate-180-fix { transform: rotate(180deg); }

.slide {
  background-repeat:no-repeat;
  background-position:center center;
  background-size:cover;
}

#mainOverlay {
  background:#fff;
  background-image:url('四角ロゴ.PNG');
  background-repeat:no-repeat;
  background-size:contain;
  background-position:center center;
  transition:opacity 0.8s ease;
  z-index:20; pointer-events:none;
}

#mainOverlay.visible { opacity:1; }

#startOverlay {
  position:fixed; inset:0;
  background:#000; color:#fff;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  z-index:9999; cursor:pointer; text-align:center;
  /* 縦持ち状態で文字が読めるよう補正が必要な場合はここを調整 */
}
#startOverlay h1 { font-size:7vw; margin-bottom:2vh; }
#startOverlay p  { font-size:4vw; opacity:0.8; }
</style>
</head>

<body>
<div id="startOverlay">
  <h1>タップしてスタート</h1>
  <p>動画の読み込みと同期を開始します</p>
</div>
<div id="mainOverlay"></div>

<script>
// --- 設定 ---
var params = new URLSearchParams(location.search);
var side = (params.get('side') || 'right').toLowerCase();

var contents = [
  {type:'video', src:'video1.mp4', duration:15000, className:'rotate-90-fix'},
  {type:'video', src:'video2.mp4', duration:15000, className:'rotate-neg90-fix'},
  {type:'video', src:'video3.mp4', duration:10000, className:'rotate-180-fix'},
  {type:'image', src:'calendar.jpg', duration:10000}
];

var MAIN_MS = 10000; // ロゴ画面の表示時間
// ------------

var INDIVIDUAL_MS = 0;
contents.forEach(function(c) { INDIVIDUAL_MS += c.duration; });
var CYCLE_MS = INDIVIDUAL_MS + MAIN_MS;

var clipLeft  = 'polygon(0 0, 50% 0, 50% 100%, 0 100%)';
var clipRight = 'polygon(50% 0, 100% 0, 100% 100%, 50% 100%)';
var clip = (side === 'left') ? clipLeft : clipRight;

var overlay = document.getElementById('mainOverlay');
overlay.style.clipPath = clip;

var started = false;
var syncPhase = null;
var lastContentIdx = -1;

var offsets = [];
var acc = 0;
contents.forEach(function(c) {
  offsets.push(acc);
  acc += c.duration;
});

// 要素の生成
var elements = contents.map(function(c, i) {
  var el;
  if (c.type === 'video') {
    el = document.createElement('video');
    el.src = c.src;
    el.muted = true;
    el.playsInline = true;
    el.preload = 'auto'; // 事前読み込み
    if (c.className) el.classList.add(c.className);
  } else {
    el = document.createElement('div');
    el.className = 'slide';
    el.style.backgroundImage = "url('" + c.src + "')";
  }
  el.style.clipPath = clip;
  el.style.opacity = '0';
  document.body.appendChild(el);
  return el;
});

function hideAll() {
  elements.forEach(function(el) {
    el.style.opacity = '0';
    if (el.tagName === 'VIDEO') el.pause();
  });
}

function showContent(i) {
  hideAll();
  var el = elements[i];
  var c  = contents[i];
  
  // 同期計算：現在のサイクル内での経過時間を割り出す
  var now = Date.now();
  var offsetInCycle = now % CYCLE_MS;
  var startTimeInContent = (offsetInCycle - offsets[i]) / 1000;

  el.style.opacity = '1';
  if (c.type === 'video') {
    if (startTimeInContent > 0) {
      el.currentTime = startTimeInContent; // 再生位置を強制同期
    } else {
      el.currentTime = 0;
    }
    el.play().catch(function(e) { console.error("再生失敗:", e); });
  }
}

function tick() {
  if (!started) return;
  var offset = Date.now() % CYCLE_MS;
  var isMain = offset >= INDIVIDUAL_MS;

  if (isMain) {
    if (syncPhase !== 'main') {
      syncPhase = 'main';
      lastContentIdx = -1;
      hideAll();
      overlay.classList.add('visible');
    }
  } else {
    var idx = 0;
    for (var i = contents.length - 1; i >= 0; i--) {
      if (offset >= offsets[i]) { idx = i; break; }
    }
    
    if (syncPhase !== 'individual') {
      syncPhase = 'individual';
      overlay.classList.remove('visible');
    }
    if (idx !== lastContentIdx) {
      lastContentIdx = idx;
      showContent(idx);
    }
  }
}

// 精度向上のため100msごとにチェック
setInterval(tick, 100);

// スタートボタン押下時の処理
document.getElementById('startOverlay').addEventListener('click', function() {
  started = true;
  document.getElementById('startOverlay').style.display = 'none';
  ensureFullscreen();

  // ブラウザの自動再生ブロックを解除するために全動画を一度ロード
  elements.forEach(function(el) {
    if (el.tagName === 'VIDEO') {
      el.load();
    }
  });
});

function ensureFullscreen() {
  var el = document.documentElement;
  if (!document.fullscreenElement) {
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  }
}
</script>
</body>
</html>
