<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; width:100vw; height:100vh; overflow:hidden; }
  img, video {
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    opacity:0;
    transition: opacity 0.5s ease;
  }
  .visible { opacity:1 !important; }
</style>
</head>
<body>
<img id="img-el" src="" alt="">
<video id="vid-el" muted playsinline loop></video>
<script>
const SCREEN_ID = 's2';
const INDIVIDUAL_MS = 20000;
const MAIN_MS = 10000;
const CYCLE_MS = INDIVIDUAL_MS + MAIN_MS;

const imgEl = document.getElementById('img-el');
const vidEl = document.getElementById('vid-el');
let playlist = { individual: [], main: null };
let idx = 0;
let currentPhase = null;

async function loadPlaylist() {
  const res = await fetch('/signage/playlist.json?t=' + Date.now());
  const data = await res.json();
  playlist.individual = data[SCREEN_ID] || [];
  playlist.main = (data['main'] || [])[0] || null;
}

function show(item) {
  if (!item) return;
  imgEl.classList.remove('visible');
  vidEl.classList.remove('visible');
  if (item.type === 'image') {
    imgEl.src = '/signage/' + item.src;
    imgEl.onload = () => imgEl.classList.add('visible');
  } else {
    vidEl.src = '/signage/' + item.src;
    vidEl.load();
    vidEl.play();
    vidEl.classList.add('visible');
  }
}

function tick() {
  const offset = Date.now() % CYCLE_MS;
  const isMain = offset >= INDIVIDUAL_MS;

  if (isMain && currentPhase !== 'main') {
    currentPhase = 'main';
    show(playlist.main);
  } else if (!isMain && currentPhase !== 'individual') {
    currentPhase = 'individual';
    if (playlist.individual.length > 0) {
      show(playlist.individual[idx]);
      idx = (idx + 1) % playlist.individual.length;
    }
    loadPlaylist();
  }
}

loadPlaylist().then(() => {
  tick();
  setInterval(tick, 500);
});
</script>
</body>
</html>
