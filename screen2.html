<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>SCREEN 2 - RIGHT</title>
<style>
html { margin:0; padding:0; width:100vw; height:100vh; background:#000; overflow:hidden; }
body {
  margin:0; padding:0; width:100vh; height:100vw;
  transform:rotate(-90deg); transform-origin:left top;
  position:absolute; top:100vh; left:0;
  overflow:hidden; background:#000;
}

/* --- SCREEN 2 の核となる設定 --- */
video, .slide {
  position:fixed; top:0; 
  /* 幅を2枚分(200%)にして、左に1枚分(100%)はみ出させる = 右半分が表示される */
  left:-100%; 
  width:200%; height:100%;
  object-fit:fill; opacity:0; z-index:1;
  transition:opacity 0.5s ease-in-out;
}

.slide {
  position: fixed;
  top: 0;
  /* 左に1枚分ずらして右半分を画面内に入れる */
  left: -100%; 
  width: 200%; /* 2画面分の幅 */
  height: 100%;
  background-repeat: no-repeat;
  /* 画像を2画面分（200%）に強制的に引き伸ばす */
  background-size: 100% 100%; 
  /* 右端を基準にする */
  background-position: right center; 
  opacity: 0;
  transition: opacity 0.5s ease-in-out;
  z-index: 1;
}
#mainOverlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  /* ロゴの右側を表示 */
  background:#fff url('四角ロゴ.PNG') no-repeat right center;
  background-size:200% auto; opacity:0;
  transition:opacity 0.8s ease; z-index:20; pointer-events:none;
}
/* ------------------------------ */

#mainOverlay.visible { opacity:1; }
#startOverlay {
  position:fixed; inset:0; background:#000; color:#fff;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  z-index:9999; cursor:pointer; text-align:center;
}
</style>
</head>
<body>

<div id="startOverlay">
  <h1>タップしてスタート</h1>
  <p>SCREEN 2 (RIGHT SIDE)</p>
</div>
<div id="mainOverlay"></div>

<script>
// コンテンツ設定 (Screen 1と完全に一致させてください)
var contents = [
  {type:'video', src:'video1.mp4', duration:10000},
  {type:'image', src:'calendar.jpg', duration:10000},
  {type:'video', src:'video2.mp4', duration:10000},
  {type:'image', src:'holiday.jpg', duration:10000},
  {type:'image', src:'event.jpg', duration:10000}
];
var MAIN_MS = 10000;

var INDIVIDUAL_MS = 0;
contents.forEach(function(c) { INDIVIDUAL_MS += c.duration; });
var CYCLE_MS = INDIVIDUAL_MS + MAIN_MS;
var offsets = [];
var acc = 0;
contents.forEach(function(c) { offsets.push(acc); acc += c.duration; });

var overlay = document.getElementById('mainOverlay');
var started = false;
var lastContentIdx = -1;

var elements = contents.map(function(c) {
  var el;
  if (c.type === 'video') {
    el = document.createElement('video');
    el.src = c.src;
    el.muted = true;
    el.setAttribute('muted', '');
    el.setAttribute('playsinline', '');
    el.preload = 'auto'; 
  } else {
    el = document.createElement('div');
    el.className = 'slide';
    el.style.backgroundImage = "url('" + c.src + "')";
  }
  document.body.appendChild(el);
  return el;
});

// フルスクリーン要求関数
function enterFullscreen() {
  var el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
  else if (el.msRequestFullscreen) el.msRequestFullscreen();
}

// Screen 2 (右側) の updateDisplay 関数内を修正

function updateDisplay(idx) {
  elements.forEach(function(el, i) {
    if (i === idx) {
      el.style.opacity = '1';
      el.style.zIndex = '10';
      if (contents[i].type === 'video') {
        var offset = Date.now() % CYCLE_MS;
        
        // ★ ここを修正：0.5秒分（500ms）足して、再生位置を未来に進める
        // これにより、Screen 2の遅れを相殺します
        var targetTime = (offset - offsets[i] + 500) / 1000; 

        if(el.src === "") el.src = contents[i].src;
        el.play().then(function() {
          el.currentTime = targetTime;
        }).catch(function(e) {
          setTimeout(function() { el.play(); }, 200);
        });
      }
    } else {
      // (中略：他の非表示処理)
      el.style.opacity = '0';
      el.style.zIndex = '1';
      if (el.tagName === 'VIDEO') {
        el.pause();
        el.src = ""; 
        el.load();
      }
    }
  });
}
function tick() {
  if (!started) return;
  var offset = Date.now() % CYCLE_MS;
  var isMain = offset >= INDIVIDUAL_MS;

  if (isMain) {
    if (lastContentIdx !== 999) {
      lastContentIdx = 999;
      elements.forEach(function(el){ 
        el.style.opacity = '0'; 
        if(el.tagName==='VIDEO') {
          el.pause();
          el.src = ""; // メモリ解放
          el.load();
          el.src = contents[elements.indexOf(el)].src;
        }
      });
      overlay.classList.add('visible');
    }
  } else {
    var idx = 0;
    for (var i = contents.length - 1; i >= 0; i--) {
      if (offset >= offsets[i]) { idx = i; break; }
    }
    if (idx !== lastContentIdx) {
      overlay.classList.remove('visible');
      lastContentIdx = idx;
      updateDisplay(idx);
    }
    // ★ tick内での自動シーク(syncVideo)は負荷が重すぎるため削除しました
  }
}
// 0.5秒ごとに同期チェック
setInterval(tick, 500);

document.getElementById('startOverlay').addEventListener('click', function() {
  this.style.display = 'none';
  enterFullscreen(); // タップ直後に実行
  started = true;
  tick();
});

// フルスクリーンが解除された際の自動復帰
document.addEventListener('fullscreenchange', function() {
  if (!document.fullscreenElement && started) setTimeout(enterFullscreen, 5000);
});
document.addEventListener('webkitfullscreenchange', function() {
  if (!document.webkitFullscreenElement && started) setTimeout(enterFullscreen, 5000);
});
</script>
</body>
</html>
