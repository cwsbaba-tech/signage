<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>SCREEN 2</title>

<style>
html,
body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}

/* 画面全体を90度回転 */
body{
  position:fixed;
  inset:0;
  transform:rotate(-90deg);
  transform-origin:center center;
}

/* 画像 */
.slide{
  position:fixed;
  inset:0;

  background-repeat:no-repeat;
  background-position:center center;
  background-size:cover;

  opacity:0;
  transition:opacity .5s ease-in-out;

  z-index:1;
}

/* 動画 */
video{
  position:fixed;
  inset:0;

  width:100%;
  height:100%;

  object-fit:cover;

  opacity:0;
  transition:opacity .5s ease-in-out;

  z-index:1;
}

/* ロゴオーバーレイ */
#mainOverlay{
  position:fixed;
  inset:0;

  background:
    #fff
    url('四角ロゴ.PNG')
    no-repeat
    center center;

  background-size:contain;

  opacity:0;
  transition:opacity .8s ease;

  z-index:20;

  pointer-events:none;
}

#mainOverlay.visible{
  opacity:1;
}

/* スタート画面 */
#startOverlay{
  position:fixed;
  inset:0;

  background:#000;
  color:#fff;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  z-index:9999;

  cursor:pointer;

  font-family:sans-serif;
  text-align:center;
}

#startOverlay h1{
  margin:0 0 20px;
  font-size:48px;
}

#startOverlay p{
  margin:0;
  opacity:.7;
  font-size:24px;
}
</style>
</head>

<body>

<!-- スタート画面 -->
<div id="startOverlay">
  <h1>タップしてスタート</h1>
  <p>SCREEN 2 (RIGHT SIDE)</p>
</div>

<!-- ロゴ画面 -->
<div id="mainOverlay"></div>

<script>
/* =========================
   コンテンツ設定
========================= */

const contents = [

  { type:'video', src:'video1.mp4', duration:9900 },

  { type:'image', src:'calendar.jpg', duration:10000 },

  { type:'video', src:'video2.mp4', duration:10000 },

  { type:'image', src:'holiday.jpg', duration:10000 },

  { type:'image', src:'event.jpg', duration:10000 }

];

/* ロゴ表示時間 */
const MAIN_MS = 10000;

/* 時刻補正 */
const ADJUST_MS = 0;


/* =========================
   内部処理
========================= */

const overlay = document.getElementById('mainOverlay');

let started = false;
let lastContentIdx = -1;

/* 合計時間 */
let INDIVIDUAL_MS = 0;

contents.forEach(c => {
  INDIVIDUAL_MS += c.duration;
});

const CYCLE_MS = INDIVIDUAL_MS + MAIN_MS;

/* 各コンテンツ開始位置 */
const offsets = [];

let acc = 0;

contents.forEach(c => {
  offsets.push(acc);
  acc += c.duration;
});

/* 要素生成 */
const elements = contents.map(c => {

  let el;

  if(c.type === 'video'){

    el = document.createElement('video');

    el.src = c.src;

    el.muted = true;
    el.loop = false;
    el.preload = 'auto';

    el.setAttribute('muted','');
    el.setAttribute('playsinline','');

  }else{

    el = document.createElement('div');

    el.className = 'slide';

    el.style.backgroundImage = `url('${c.src}')`;
  }

  document.body.appendChild(el);

  return el;
});


/* =========================
   表示切替
========================= */

function hideAll(){

  elements.forEach(el => {

    el.style.opacity = '0';

    if(el.tagName === 'VIDEO'){
      el.pause();
      el.currentTime = 0;
    }

  });

}

function showContent(idx){

  elements.forEach((el, i) => {

    if(i === idx){

      el.style.opacity = '1';

      if(el.tagName === 'VIDEO'){

        el.currentTime = 0;

        el.play().catch(()=>{});

      }

    }else{

      el.style.opacity = '0';

      if(el.tagName === 'VIDEO'){

        el.pause();
        el.currentTime = 0;

      }
    }

  });

}


/* =========================
   メインループ
========================= */

function tick(){

  if(!started) return;

  const now = Date.now() + ADJUST_MS;

  const offset = now % CYCLE_MS;

  const isMain = offset >= INDIVIDUAL_MS;

  /* ロゴ画面 */
  if(isMain){

    if(lastContentIdx !== 999){

      lastContentIdx = 999;

      hideAll();

      overlay.classList.add('visible');
    }

    return;
  }

  /* 通常コンテンツ */
  let idx = 0;

  for(let i = contents.length - 1; i >= 0; i--){

    if(offset >= offsets[i]){

      idx = i;
      break;
    }
  }

  if(idx !== lastContentIdx){

    overlay.classList.remove('visible');

    lastContentIdx = idx;

    showContent(idx);
  }
}

setInterval(tick, 100);


/* =========================
   スタート処理
========================= */

document
.getElementById('startOverlay')
.addEventListener('click', () => {

  document.getElementById('startOverlay').style.display = 'none';

  ensureFullscreen();

  started = true;

});


/* =========================
   フルスクリーン
========================= */

function ensureFullscreen(){

  const el = document.documentElement;

  if(el.requestFullscreen){

    el.requestFullscreen();

  }else if(el.webkitRequestFullscreen){

    el.webkitRequestFullscreen();
  }
}
</script>

</body>
</html>
