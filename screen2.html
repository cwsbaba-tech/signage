<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>SCREEN 1</title>
<style>
html, body {
  margin:0; padding:0;
  width:100%; height:100%;
  background:#000; overflow:hidden;
}

/* 全要素を90度回転して縦画面に */
.slide {
  position:fixed;
  top:0; left:0;
  width:100vh;
  height:100vw;
  transform:rotate(90deg);
  transform-origin:top left;
  margin-top:calc(100vw - 100vh);
  background-repeat:no-repeat;
  background-position:bottom center;
  background-size:auto 50%;
  opacity:0;
  transition:opacity 0.5s ease-in-out;
}

video {
  position:fixed;
  top:0; left:0;
  width:100vh;
  height:100vw;
  transform:rotate(90deg);
  transform-origin:top left;
  margin-top:calc(100vw - 100vh);
  object-fit:cover;
  object-position:center bottom;
  opacity:0;
  transition:opacity 0.5s ease-in-out;
}

#mainOverlay {
  position:fixed;
  top:0; left:0;
  width:100vh;
  height:100vw;
  transform:rotate(90deg);
  transform-origin:top left;
  margin-top:calc(100vw - 100vh);
  background:#fff url('四角ロゴ.PNG') no-repeat center center;
  background-size:auto 50%;
  opacity:0;
  transition:opacity 0.8s ease;
  z-index:20; pointer-events:none;
}
#mainOverlay.visible { opacity:1; }

#startOverlay {
  position:fixed; inset:0;
  background:#000; color:#fff;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  z-index:9999; cursor:pointer; text-align:center;
}
#startOverlay h1 { font-size:5vw; margin-bottom:2vh; }
#startOverlay p  { font-size:3vw; opacity:0.8; }
</style>
</head>
<body>

<div id="startOverlay">
  <h1>タップしてスタート</h1>
  <p>映像の左半分を表示します</p>
</div>
<div id="mainOverlay"></div>

<script>
var contents = [
  {type:'video', src:'video1.mp4', duration:10000},
  {type:'image', src:'calendar.jpg', duration:10000},
  {type:'video', src:'video2.mp4', duration:10000},
  {type:'image', src:'holiday.jpg', duration:10000},
  {type:'image', src:'event.jpg', duration:10000}
];

var INDIVIDUAL_MS = 0;
contents.forEach(function(c) { INDIVIDUAL_MS += c.duration; });
var MAIN_MS  = 10000;
var CYCLE_MS = INDIVIDUAL_MS + MAIN_MS;

var overlay        = document.getElementById('mainOverlay');
var started        = false;
var syncPhase      = null;
var lastContentIdx = -1;

var offsets = [];
var acc = 0;
contents.forEach(function(c) { offsets.push(acc); acc += c.duration; });

var elements = contents.map(function(c) {
  var el;
  if (c.type === 'video') {
    el = document.createElement('video');
    el.src = c.src;
    el.muted = true;
    el.loop = false;
    el.setAttribute('muted', '');
    el.setAttribute('playsinline', '');
    el.setAttribute('webkit-playsinline', '');
    el.preload = 'none';
  } else {
    el = document.createElement('div');
    el.className = 'slide';
    el.style.backgroundImage = "url('" + c.src + "')";
  }
  el.style.opacity = '0';
  document.body.appendChild(el);
  return el;
});

function hideAll() {
  elements.forEach(function(el) {
    el.style.opacity = '0';
    if (el.tagName === 'VIDEO') el.pause();
  });
  overlay.classList.remove('visible');
}

function showContent(i) {
  hideAll();
  var el = elements[i];
  var c  = contents[i];
  el.style.opacity = '1';
  if (c.type === 'video') {
    el.load();
    el.currentTime = 0;
    el.play().catch(function(e) { console.log(e); });
  }
}

function getIdx(offset) {
  for (var i = contents.length - 1; i >= 0; i--) {
    if (offset >= offsets[i]) return i;
  }
  return 0;
}

function tick() {
  if (!started) return;
  var offset = Date.now() % CYCLE_MS;
  var isMain = offset >= INDIVIDUAL_MS;

  if (isMain) {
    if (syncPhase !== 'main') {
      syncPhase = 'main';
      lastContentIdx = -1;
      hideAll();
      overlay.classList.add('visible');
    }
  } else {
    var idx = getIdx(offset);
    if (syncPhase !== 'individual') {
      syncPhase = 'individual';
      overlay.classList.remove('visible');
    }
    if (idx !== lastContentIdx) {
      lastContentIdx = idx;
      showContent(idx);
    }
  }
}

setInterval(tick, 100);

document.getElementById('startOverlay').addEventListener('click', function() {
  document.getElementById('startOverlay').style.display = 'none';
  ensureFullscreen();
  started = true;
  showContent(0);
  lastContentIdx = 0;
});

function ensureFullscreen() {
  var el = document.documentElement;
  if (!document.fullscreenElement) {
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.msRequestFullscreen) el.msRequestFullscreen();
  }
}
document.addEventListener('fullscreenchange', function() {
  if (!document.fullscreenElement) setTimeout(ensureFullscreen, 500);
});
</script>
</body>
</html>
