<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>SCREEN 1 - LEFT</title>
<style>
html { margin:0; padding:0; width:100vw; height:100vh; background:#000; overflow:hidden; }
body {
  margin:0; padding:0; width:100vh; height:100vw;
  transform:rotate(-90deg); transform-origin:left top;
  position:absolute; top:100vh; left:0;
  overflow:hidden; background:#000;
}
/* コンテンツの配置（Screen 1は左端） */
video, .slide {
  position:fixed; top:0; left:0; width:200%; height:100%;
  object-fit:fill; opacity:0; z-index:1;
  transition:opacity 0.5s ease-in-out;
}
.slide {
  background-repeat:no-repeat; background-size:100% 100%; background-position:left center;
}
#mainOverlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:#fff url('四角ロゴ.PNG') no-repeat left center;
  background-size:200% auto; opacity:0;
  transition:opacity 0.8s ease; z-index:20; pointer-events:none;
}
#mainOverlay.visible { opacity:1; }
#startOverlay {
  position:fixed; inset:0; background:#000; color:#fff;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  z-index:9999; cursor:pointer; text-align:center;
}
</style>
</head>
<body>

<div id="startOverlay">
  <h1>タップしてスタート</h1>
  <p>SCREEN 1 (BASE)</p>
</div>
<div id="mainOverlay"></div>

<script>
// --- 1. 全画面共通の再生スケジュール ---
var contents = [
  {type:'video', src:'video1.mp4',  duration:12000},
  {type:'image', src:'calendar.jpg', duration:8000},
  {type:'video', src:'video2.mp4',  duration:12000},
  {type:'image', src:'holiday.jpg',  duration:5000},
  {type:'image', src:'event.jpg',    duration:5000}
];
var MAIN_MS = 10000; // ロゴの時間

// --- 2. ★この画面専用の微調整設定 ---
// 他の画面とズレる場合、ここだけ書き換えます
var OFFSET_MS = 0;    // 切り替えタイミング補正（例: 500 で0.5秒早める）
var VIDEO_ADJUST = 0; // 動画の再生位置補正（秒単位。例: 0.2 で0.2秒進める）

// --- 3. 同期ロジックの計算 ---
var INDIVIDUAL_MS = 0;
contents.forEach(function(c) { INDIVIDUAL_MS += c.duration; });
var CYCLE_MS = INDIVIDUAL_MS + MAIN_MS;
var offsets = [];
var acc = 0;
contents.forEach(function(c) { offsets.push(acc); acc += c.duration; });

var overlay = document.getElementById('mainOverlay');
var started = false;
var lastContentIdx = -1;

// 要素作成
var elements = contents.map(function(c) {
  var el;
  if (c.type === 'video') {
    el = document.createElement('video');
    el.src = c.src; el.muted = true;
    el.setAttribute('muted', ''); el.setAttribute('playsinline', '');
    el.preload = 'auto';
  } else {
    el = document.createElement('div');
    el.className = 'slide';
    el.style.backgroundImage = "url('" + c.src + "')";
  }
  document.body.appendChild(el);
  return el;
});

function updateDisplay(idx) {
  elements.forEach(function(el, i) {
    if (i === idx) {
      el.style.opacity = '1';
      el.style.zIndex = '10';
      if (contents[i].type === 'video') {
        var now = Date.now() + OFFSET_MS;
        var targetTime = ((now % CYCLE_MS) - offsets[i]) / 1000 + VIDEO_ADJUST;
        if(el.src === "") el.src = contents[i].src;
        el.play().then(function() { el.currentTime = Math.max(0, targetTime); });
      }
    } else {
      el.style.opacity = '0';
      el.style.zIndex = '1';
      if (el.tagName === 'VIDEO') { el.pause(); el.src = ""; el.load(); }
    }
  });
}

function tick() {
  if (!started) return;
  var now = Date.now() + OFFSET_MS;
  var offset = now % CYCLE_MS;
  var isMain = offset >= INDIVIDUAL_MS;

  if (isMain) {
    if (lastContentIdx !== 999) {
      lastContentIdx = 999;
      elements.forEach(function(el){ el.style.opacity = '0'; if(el.tagName==='VIDEO'){ el.pause(); el.src=""; el.load(); } });
      overlay.classList.add('visible');
    }
  } else {
    var idx = 0;
    for (var i = contents.length - 1; i >= 0; i--) {
      if (offset >= offsets[i]) { idx = i; break; }
    }
    if (idx !== lastContentIdx) {
      overlay.classList.remove('visible');
      lastContentIdx = idx;
      updateDisplay(idx);
    }
  }
}

setInterval(tick, 100);

document.getElementById('startOverlay').addEventListener('click', function() {
  this.style.display = 'none';
  var el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  started = true;
});
</script>
</body>
</html>
