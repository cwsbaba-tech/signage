<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>SCREEN 1 - LEFT</title>
<style>
html { margin:0; padding:0; width:100vw; height:100vh; background:#000; overflow:hidden; }
body {
  margin:0; padding:0; width:100vh; height:100vw;
  transform:rotate(-90deg); transform-origin:left top;
  position:absolute; top:100vh; left:0;
  overflow:hidden; background:#000;
}
/* Screen 2 用のビデオ配置：左に1枚分追い出して右半分を表示 */
video {
  position:fixed; top:0; 
  left:-100%; /* ここを変更 */
  width:200%; height:100%;
  object-fit:fill; opacity:0;
  transition:opacity 0.5s ease-in-out;
}

/* Screen 2 用の画像配置 */
.slide {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background-repeat:no-repeat;
  background-position:right center; /* ここを変更 */
  background-size:200% auto;
  opacity:0; transition:opacity 0.5s ease-in-out;
}
#mainOverlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:#fff url('四角ロゴ.PNG') no-repeat right center;
  background-size:200% auto; opacity:0;
  transition:opacity 0.8s ease; z-index:20; pointer-events:none;
}
#mainOverlay.visible { opacity:1; }
#startOverlay {
  position:fixed; inset:0; background:#000; color:#fff;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  z-index:9999; cursor:pointer; text-align:center;
}
</style>
</head>
<body>

<div id="startOverlay">
  <h1>タップしてスタート</h1>
  <p>SCREEN 1 (LEFT SIDE)</p>
</div>
<div id="mainOverlay"></div>

<script>
// --- 同期設定 ---
var contents = [
  {type:'video', src:'video1.mp4', duration:10000},
  {type:'image', src:'calendar.jpg', duration:10000},
  {type:'video', src:'video2.mp4', duration:10000},
  {type:'image', src:'holiday.jpg', duration:10000},
  {type:'image', src:'event.jpg', duration:10000}
];
var MAIN_MS = 10000;

// --- ロジック ---
var INDIVIDUAL_MS = 0;
contents.forEach(function(c) { INDIVIDUAL_MS += c.duration; });
var CYCLE_MS = INDIVIDUAL_MS + MAIN_MS;
var offsets = [];
var acc = 0;
contents.forEach(function(c) { offsets.push(acc); acc += c.duration; });

var overlay = document.getElementById('mainOverlay');
var started = false;
var syncPhase = null;
var lastContentIdx = -1;

var elements = contents.map(function(c) {
  var el;
  if (c.type === 'video') {
    el = document.createElement('video');
    el.src = c.src;
    el.muted = true;
    el.setAttribute('muted', '');
    el.setAttribute('playsinline', '');
    el.preload = 'auto';
    el.loop = false;
  } else {
    el = document.createElement('div');
    el.className = 'slide';
    el.style.backgroundImage = "url('" + c.src + "')";
  }
  el.style.opacity = '0';
  document.body.appendChild(el);
  return el;
});

function hideAll() {
  elements.forEach(function(el) {
    el.style.opacity = '0';
    if (el.tagName === 'VIDEO') el.pause();
  });
  overlay.classList.remove('visible');
}

function showContent(i) {
  hideAll();
  var el = elements[i];
  var c = contents[i];
  
  if (c.type === 'video') {
    var offset = Date.now() % CYCLE_MS;
    var targetTime = (offset - offsets[i]) / 1000;
    el.currentTime = Math.max(0, targetTime);
    
    var playPromise = el.play();
    if (playPromise !== undefined) {
      playPromise.then(function() { el.style.opacity = '1'; })
      .catch(function() { setTimeout(function(){ el.play(); }, 200); });
    }
  } else {
    el.style.opacity = '1';
  }
}

function tick() {
  if (!started) return;
  var offset = Date.now() % CYCLE_MS;
  var isMain = offset >= INDIVIDUAL_MS;

  if (isMain) {
    if (syncPhase !== 'main') {
      syncPhase = 'main'; lastContentIdx = -1;
      hideAll(); overlay.classList.add('visible');
    }
  } else {
    var idx = 0;
    for (var i = contents.length - 1; i >= 0; i--) {
      if (offset >= offsets[i]) { idx = i; break; }
    }
    if (syncPhase !== 'individual') {
      syncPhase = 'individual'; overlay.classList.remove('visible');
    }
    if (idx !== lastContentIdx) {
      lastContentIdx = idx; showContent(idx);
    }
    // 強制同期
    var curEl = elements[idx];
    if (contents[idx].type === 'video' && !curEl.paused) {
      var target = (offset - offsets[idx]) / 1000;
      if (Math.abs(curEl.currentTime - target) > 0.3) {
        curEl.currentTime = target;
      }
    }
  }
}

setInterval(tick, 100);

document.getElementById('startOverlay').addEventListener('click', function() {
  this.style.display = 'none';
  if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
  started = true;
});
</script>
</body>
</html>
