<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>SCREEN 2</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; }

  .slide {
    position:absolute; inset:0;
    background-size:200% auto;
    background-position:right center;
    background-repeat:no-repeat;
    opacity:0;
    transition: opacity 1s ease-in-out;
  }

  video {
    position:absolute; inset:0;
    width:200%; height:100%;
    object-fit:cover;
    object-position:right center;
    opacity:0;
    transition: opacity 1s ease-in-out;
  }

  #mainOverlay {
    position:absolute; inset:0;
    background:#fff url('四角ロゴ.PNG') no-repeat right center;
    background-size:200% auto;
    opacity:0;
    transition: opacity 0.8s ease;
    z-index:10;
  }
  #mainOverlay.visible { opacity:1; }

  #startOverlay {
    position:fixed; inset:0;
    background:#000; color:#fff;
    display:flex; flex-direction:column;
    justify-content:center; align-items:center;
    z-index:9999; cursor:pointer; text-align:center;
  }
  #startOverlay h1 { font-size:7vw; margin-bottom:2vh; }
  #startOverlay p  { font-size:4vw; opacity:0.8; }
</style>
</head>
<body>

<div id="startOverlay">
  <h1>タップしてスタート</h1>
  <p>全画面表示で開始します</p>
</div>
<div id="mainOverlay"></div>

<script>
var contents = [
  {type:'image', src:'calendar.jpg', duration:10000}
];

var INDIVIDUAL_MS = 0;
contents.forEach(function(c) { INDIVIDUAL_MS += c.duration; });
var MAIN_MS  = 10000;
var CYCLE_MS = INDIVIDUAL_MS + MAIN_MS;

var offsets = [];
var acc = 0;
contents.forEach(function(c) { offsets.push(acc); acc += c.duration; });

var overlay   = document.getElementById('mainOverlay');
var started   = false;
var syncPhase = null;
var lastIdx   = -1;

var elements = [];
contents.forEach(function(c, i) {
  var el;
  if (c.type === 'video') {
    el = document.createElement('video');
    el.src = c.src;
    el.muted = true;
    el.loop = false;
    el.setAttribute('muted', '');
    el.setAttribute('playsinline', '');
    el.setAttribute('webkit-playsinline', '');
  } else {
    el = document.createElement('div');
    el.className = 'slide';
    el.style.backgroundImage = "url('" + c.src + "')";
  }
  el.id = 'content_' + i;
  document.body.appendChild(el);
  elements.push(el);
});

function hideAll() {
  elements.forEach(function(el) {
    el.style.opacity = '0';
    if (el.tagName === 'VIDEO') el.pause();
  });
  overlay.classList.remove('visible');
}

function showContent(i) {
  hideAll();
  var el = elements[i];
  var c  = contents[i];
  el.style.opacity = '1';
  if (c.type === 'video') {
    el.currentTime = 0;
    el.play();
  }
}

function getIdx(offset) {
  for (var i = contents.length - 1; i >= 0; i--) {
    if (offset >= offsets[i]) return i;
  }
  return 0;
}

function tick() {
  if (!started) return;
  var offset = Date.now() % CYCLE_MS;
  var isMain = offset >= INDIVIDUAL_MS;

  if (isMain) {
    if (syncPhase !== 'main') {
      syncPhase = 'main';
      lastIdx = -1;
      hideAll();
      overlay.classList.add('visible');
    }
  } else {
    var idx = getIdx(offset);
    if (syncPhase !== 'individual') {
      syncPhase = 'individual';
      overlay.classList.remove('visible');
    }
    if (idx !== lastIdx) {
      lastIdx = idx;
      showContent(idx);
    }
  }
}

setInterval(tick, 500);

document.getElementById('startOverlay').addEventListener('click', function() {
  ensureFullscreen();
  document.getElementById('startOverlay').style.display = 'none';
  started = true;
  showContent(0);
  lastIdx = 0;
});

function ensureFullscreen() {
  var el = document.documentElement;
  if (!document.fullscreenElement) {
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.msRequestFullscreen) el.msRequestFullscreen();
  }
}
document.addEventListener('fullscreenchange', function() {
  if (!document.fullscreenElement) setTimeout(ensureFullscreen, 500);
});
</script>
</body>
</html>
