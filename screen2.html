<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>SCREEN 2</title>
<style>
/* 1. 画面の土台を固定 */
html, body { 
  margin:0; padding:0; width:100vw; height:100vh; 
  background:#000; overflow:hidden; 
}

/* 2. 90度回転の制御（親要素をはみ出さないように設定） */
body {
  width: 100vh;
  height: 100vw;
  transform: rotate(-90deg);
  transform-origin: top left;
  position: absolute;
  top: 100vh;
  left: 0;
}

/* 3. 画像スライド（右半分を切り出す） */
.slide {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-repeat: no-repeat;
  /* background-positionを【left】にすると画像の左端が出るので、
     右半分を出すために【-100%分ずらす】処理を行います */
  background-size: 200% 100%; 
  background-position: 100% 0%; /* 右端に合わせる */
  opacity: 0;
  transition: opacity 0.5s ease-in-out;
}

/* 4. 動画（右半分を切り出す） */
video {
  position: absolute;
  top: 0;
  /* 2倍の幅の動画を左に1画面分追い出す */
  left: -100% !important; 
  width: 200% !important;
  height: 100% !important;
  object-fit: fill;
  opacity: 0;
  transition: opacity 0.5s ease-in-out;
}

/* 5. ロゴの右半分（Screen1と合体して中央に見える） */
#mainOverlay {
  position: absolute; /* fixedからabsoluteに変更して回転に追従させる */
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #fff url('四角ロゴ.PNG') no-repeat;
  /* ロゴの右半分を出すために背景位置を【左端(0%)】にする（画像自体の右側が表示される） */
  background-position: 0% 50%; 
  background-size: 200% auto; 
  opacity: 0;
  transition: opacity 0.8s ease;
  z-index: 20;
  pointer-events: none;
}

#mainOverlay.visible { opacity: 1; }

#startOverlay {
  position: absolute;
  inset: 0;
  background:#000; color:#fff;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  z-index: 9999; cursor: pointer;
}
</style>
</head>
<body>

<div id="startOverlay">
  <h1>TAP TO START</h1>
  <p>SCREEN 2 (RIGHT SIDE)</p>
</div>
<div id="mainOverlay"></div>

<script>
var contents = [
  {type:'video', src:'video1.mp4', duration:10000},
  {type:'image', src:'calendar.jpg', duration:10000},
  {type:'video', src:'video2.mp4', duration:10000},
  {type:'image', src:'holiday.jpg', duration:10000},
  {type:'image', src:'event.jpg', duration:10000}
];
var MAIN_MS = 10000;
var ADJUST_MS = 0; 

var INDIVIDUAL_MS = contents.reduce(function(a, b) { return a + b.duration; }, 0);
var CYCLE_MS = INDIVIDUAL_MS + MAIN_MS;
var offsets = [];
var acc = 0;
contents.forEach(function(c) { offsets.push(acc); acc += c.duration; });

var elements = contents.map(function(c) {
  var el = document.createElement(c.type === 'video' ? 'video' : 'div');
  if (c.type === 'video') {
    el.src = c.src; el.muted = true;
    el.setAttribute('muted', ''); el.setAttribute('playsinline', '');
    el.preload = 'auto';
  } else {
    el.className = 'slide';
    el.style.backgroundImage = "url('" + c.src + "')";
  }
  document.body.appendChild(el);
  return el;
});

function showContent(idx, offset) {
  elements.forEach(function(el, i) {
    if (i === idx) {
      el.style.opacity = '1';
      if (contents[i].type === 'video') {
        var targetTime = (offset - offsets[i]) / 1000;
        el.currentTime = Math.max(0, targetTime);
        el.play().catch(function(e){});
      }
    } else {
      el.style.opacity = '0';
      if (el.tagName === 'VIDEO') el.pause();
    }
  });
}

var lastIdx = -1;
var started = false;

function tick() {
  if (!started) return;
  var now = Date.now() + ADJUST_MS;
  var offset = now % CYCLE_MS;
  var isMain = offset >= INDIVIDUAL_MS;

  if (isMain) {
    if (lastIdx !== 999) {
      lastIdx = 999;
      elements.forEach(function(el){ el.style.opacity = '0'; if(el.pause) el.pause(); });
      document.getElementById('mainOverlay').classList.add('visible');
    }
  } else {
    var idx = 0;
    for (var i = contents.length - 1; i >= 0; i--) { if (offset >= offsets[i]) { idx = i; break; } }
    if (idx !== lastIdx) {
      document.getElementById('mainOverlay').classList.remove('visible');
      lastIdx = idx;
      showContent(idx, offset);
    }
  }
}

setInterval(tick, 100);

document.getElementById('startOverlay').addEventListener('click', function() {
  this.style.display = 'none';
  var el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  started = true;
});
</script>
</body>
</html>
