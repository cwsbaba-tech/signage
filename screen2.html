<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>SCREEN 2</title>
<style>
html {
  margin:0; padding:0;
  width:100vw; height:100vh;
  background:#000; overflow:hidden;
}
body {
  margin:0; padding:0;
  width:100vh;
  height:100vw;
  transform:rotate(-90deg);
  transform-origin:left top;
  position:absolute;
  top:100vh;
  left:0;
  overflow:hidden;
  background:#000;
}
.slide {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background-repeat:no-repeat;
  background-position:right center;
  background-size:200% auto;
  display:none;
}
video {
  position:fixed; top:0;
  width:200%; height:100%;
  object-fit:cover;
  object-position:right center;
  display:none;
  left:-100%;
}
#mainOverlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:#fff url('四角ロゴ.PNG') no-repeat right center;
  background-size:150% auto;
  display:none;
  z-index:20;
}
#tapOverlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.01);
  z-index:9999;
}
</style>
</head>
<body>

<div id="tapOverlay"></div>
<div id="mainOverlay"></div>

<script>
var contents = [
  {type:'video', src:'video1.mp4', duration:15000},
  {type:'video', src:'video2.mp4', duration:15000},
  {type:'video', src:'video3.mp4', duration:10000},
  {type:'image', src:'calendar.jpg', duration:10000}
];

var INDIVIDUAL_MS = 0;
contents.forEach(function(c) { INDIVIDUAL_MS += c.duration; });
var MAIN_MS  = 10000;
var CYCLE_MS = INDIVIDUAL_MS + MAIN_MS;

var overlay        = document.getElementById('mainOverlay');
var tapOverlay     = document.getElementById('tapOverlay');
var started        = false;
var lastContentIdx = -1;

var offsets = [];
var acc = 0;
contents.forEach(function(c) { offsets.push(acc); acc += c.duration; });

var elements = contents.map(function(c) {
  var el;
  if (c.type === 'video') {
    el = document.createElement('video');
    el.src = c.src;
    el.muted = true;
    el.loop = false;
    el.setAttribute('muted', '');
    el.setAttribute('playsinline', '');
    el.setAttribute('webkit-playsinline', '');
    el.preload = 'auto';
  } else {
    el = document.createElement('div');
    el.className = 'slide';
    el.style.backgroundImage = "url('" + c.src + "')";
  }
  el.style.display = 'none';
  document.body.appendChild(el);
  return el;
});

function hideAll() {
  elements.forEach(function(el) {
    el.style.display = 'none';
    if (el.tagName === 'VIDEO') el.pause();
  });
  overlay.style.display = 'none';
}

function showContent(i) {
  hideAll();
  var el = elements[i];
  var c  = contents[i];
  el.style.display = 'block';
  if (c.type === 'video') {
    var offsetInCycle = Date.now() % CYCLE_MS;
    var startTime = (offsetInCycle - offsets[i]) / 1000;
    el.currentTime = Math.max(0, startTime);
    el.play().catch(function(e) { console.log(e); });
  }
}

function getIdx(offset) {
  for (var i = contents.length - 1; i >= 0; i--) {
    if (offset >= offsets[i]) return i;
  }
  return 0;
}

function tick() {
  if (!started) return;
  var offset = Date.now() % CYCLE_MS;
  var isMain = offset >= INDIVIDUAL_MS;

  if (isMain) {
    if (lastContentIdx !== 999) {
      lastContentIdx = 999;
      hideAll();
      overlay.style.display = 'block';
    }
  } else {
    var idx = getIdx(offset);
    if (idx !== lastContentIdx) {
      lastContentIdx = idx;
      showContent(idx);
    }
  }
}

setInterval(tick, 100);

// タップで起動
function startSignage() {
  if (started) return;
  tapOverlay.style.display = 'none';
  started = true;
  showContent(0);
  lastContentIdx = 0;
}

tapOverlay.addEventListener('touchstart', function(e) {
  e.preventDefault();
  e.stopPropagation();
  startSignage();
}, {passive: false});

tapOverlay.addEventListener('click', function(e) {
  e.preventDefault();
  startSignage();
});

// フルスクリーン
function ensureFullscreen() {
  var el = document.documentElement;
  if (!document.fullscreenElement) {
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.msRequestFullscreen) el.msRequestFullscreen();
  }
}
document.addEventListener('fullscreenchange', function() {
  if (!document.fullscreenElement) setTimeout(ensureFullscreen, 500);
});
setTimeout(ensureFullscreen, 1000);
</script>
</body>
</html>
