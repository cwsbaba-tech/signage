<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>CYCLE CENTER YAMAGUCHI</title>
<style>
html, body { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; }
.slide {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  opacity:0;
  transition:opacity 1s ease-in-out;
}
@keyframes verticalPan {
  0%   { background-position:center top; }
  100% { background-position:center bottom; }
}
.slide.vertical {
  animation:verticalPan 20s ease-in-out forwards;
}
#caption {
  position:fixed; left:50%; top:25%;
  transform:translateX(-50%);
  color:#fff; font-weight:700; text-align:center;
  text-shadow:0 4px 12px rgba(0,0,0,0.7);
  font-size:3vw; line-height:1.4; z-index:10;
  transition:opacity 0.5s ease;
}
#phoneFooter {
  position:fixed; top:2%; left:50%;
  transform:translateX(-50%);
  color:#fff; font-weight:bold; font-size:2.5vw;
  text-shadow:0 0 10px rgba(0,0,0,0.7); z-index:10;
  transition:opacity 0.5s ease;
}
#qrLinks {
  position:fixed; bottom:1%; left:50%;
  transform:translateX(-50%);
  display:flex; gap:2.2vw; z-index:10;
  transition:opacity 0.5s ease;
}
.qrItem { text-align:center; color:#fff; font-size:1vw; }
.qrItem img { width:5vw; height:auto; border-radius:10px; }

/* 同期用オーバーレイ */
#mainOverlay {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  background:#000 no-repeat center center;
  background-size:cover;
  opacity:0;
  transition:opacity 0.8s ease;
  z-index:20;
  pointer-events:none;
}
#mainOverlay.visible { opacity:1; }
</style>
</head>
<body>

<div id="phoneFooter">☎ 03-3372-6530</div>
<div id="caption"></div>
<div id="qrLinks">
  <div class="qrItem"><a href="https://www.instagram.com/cycle_center_yamaguchi/" target="_blank"><img src="instagram.jpg"><div>Instagram</div></a></div>
  <div class="qrItem"><a href="https://x.com/Yamaguchi_Cycle" target="_blank"><img src="X.png"><div>X</div></a></div>
  <div class="qrItem"><a href="https://www.facebook.com/" target="_blank"><img src="Facebook.png"><div>Facebook</div></a></div>
  <div class="qrItem"><a href="https://cycle-center-yamaguchi.jimdofree.com/" target="_blank"><img src="HP.png"><div>公式HP</div></a></div>
</div>

<div id="mainOverlay"></div>

<script>
const slides = [
  {img:'横長ロゴ.jpg',     caption:'',                                            vertical:false},
  {img:'大正13年店舗.jpg', caption:'創業100年<br>中野区の街の自転車屋',            vertical:false},
  {img:'店舗正面.jpg',     caption:'電動アシストからスポーツ車まで<br>幅広く対応', vertical:false},
  {img:'店舗斜め.jpg',     caption:'修理・点検・カスタムも<br>お任せください',      vertical:false},
  {img:'ピット.jpg',       caption:'自転車のことなら<br>なんでもご相談ください',    vertical:false},
  {img:'イベント.jpg',     caption:'',                                            vertical:true}
];

const captionEl = document.getElementById('caption');
const phoneEl   = document.getElementById('phoneFooter');
const qrEl      = document.getElementById('qrLinks');
const overlay   = document.getElementById('mainOverlay');
let current    = 0;
let slideTimer = null;

const slideEls = slides.map(s => {
  const el = document.createElement('div');
  el.className = 'slide';
  el.style.backgroundImage = `url('${s.img}')`;
  document.body.appendChild(el);
  return el;
});

function showSlide(i) {
  captionEl.style.opacity = '0';
  slideEls.forEach((el, idx) => {
    el.style.opacity = idx === i ? '1' : '0';
    // verticalPanのリセット
    if (idx === i && slides[i].vertical) {
      el.style.animation = 'none';
      void el.offsetWidth;
      el.style.animation = 'verticalPan 20s ease-in-out forwards';
    } else if (idx === i) {
      el.style.animation = 'none';
    }
  });
  setTimeout(() => {
    captionEl.innerHTML = slides[i].caption;
    captionEl.style.opacity = '1';
  }, 1000);
}

function startSlideshow() {
  clearInterval(slideTimer);
  slideTimer = setInterval(() => {
    current = (current + 1) % slides.length;
    showSlide(current);
  }, 20000);
}

showSlide(0);
startSlideshow();

/* ===== 全画面同期（20〜30秒） ===== */
const INDIVIDUAL_MS = 20000;
const MAIN_MS       = 10000;
const CYCLE_MS      = INDIVIDUAL_MS + MAIN_MS;
let syncPhase  = null;
let savedSlide = 0;

async function loadMainVisual() {
  try {
    const res  = await fetch('playlist.json?t=' + Date.now());
    const data = await res.json();
    const main = (data['main'] || [])[0];
    if (main) overlay.style.backgroundImage = `url('${main.src}')`;
  } catch(e) {}
}

function syncTick() {
  const offset = Date.now() % CYCLE_MS;
  const isMain = offset >= INDIVIDUAL_MS;

  if (isMain && syncPhase !== 'main') {
    syncPhase  = 'main';
    savedSlide = current;
    captionEl.style.opacity = '0';
    phoneEl.style.opacity   = '0';
    qrEl.style.opacity      = '0';
    overlay.classList.add('visible');

  } else if (!isMain && syncPhase !== 'individual') {
    syncPhase = 'individual';
    overlay.classList.remove('visible');
    captionEl.style.opacity = '1';
    phoneEl.style.opacity   = '1';
    qrEl.style.opacity      = '1';
    current = savedSlide;
    showSlide(current);
    startSlideshow();
    loadMainVisual();
  }
}

loadMainVisual();
setInterval(syncTick, 500);

/* ===== フルスクリーン ===== */
function ensureFullscreen() {
  const el = document.documentElement;
  if (!document.fullscreenElement) {
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.msRequestFullscreen) el.msRequestFullscreen();
  }
}
document.addEventListener('click', ensureFullscreen, {once:true});
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) setTimeout(ensureFullscreen, 500);
});
setTimeout(ensureFullscreen, 1000);
</script>
</body>
</html>
